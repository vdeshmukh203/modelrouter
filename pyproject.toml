[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "modelrouter"
version = "0.2.0"
description = "Route LLM requests to appropriate models based on configurable rules"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
keywords = ["llm", "routing", "mlops", "large-language-models", "ai", "cost-optimization"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.optional-dependencies]
gui = []   # tkinter ships with CPython; no extra packages required

[project.scripts]
modelrouter-gui = "modelrouter.gui:launch"

[project.urls]
Repository = "https://github.com/vdeshmukh203/modelrouter"

[tool.hatch.build.targets.wheel]
packages = ["src/modelrouter"]

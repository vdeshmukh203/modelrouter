[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "modelrouter"
version = "0.1.0"
description = "Route LLM requests to appropriate models based on configurable rules"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"

[tool.hatch.build.targets.wheel]
packages = ["src/modelrouter"]

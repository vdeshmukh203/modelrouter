[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "modelrouter"
version = "0.2.0"
description = "Route LLM requests to appropriate models based on configurable rules"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [
  {name = "Vaibhav Deshmukh"},
]
keywords = ["llm", "routing", "large-language-models", "mlops", "ai"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/vdeshmukh203/modelrouter"
Repository = "https://github.com/vdeshmukh203/modelrouter"
"Bug Tracker" = "https://github.com/vdeshmukh203/modelrouter/issues"

[project.optional-dependencies]
gui = []   # tkinter ships with the standard library; listed for clarity

[project.scripts]
modelrouter-gui = "modelrouter.gui:main"

[tool.hatch.build.targets.wheel]
packages = ["src/modelrouter"]

[tool.pytest.ini_options]
testpaths = ["tests"]
